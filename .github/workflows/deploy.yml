name: CI/CD Pipeline

# This tells GitHub to run this script ONLY when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:

  #CI job
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd backend
          pytest test_app.py


  #CD Job

  deploy:
    name: Deploy to AWS EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands via SSH
        # This is a pre-built GitHub Action that securely handles SSH connections
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to the project folder
            cd log-monitoring-system

            # 2. Pull the latest code from GitHub
            git pull origin main

            # 3. Rebuild and restart the Docker containers in the background
            docker compose up -d --build
