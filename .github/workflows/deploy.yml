name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd backend
          pytest test_app.py

  deploy:
    name: Build, Push to ECR and Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }} \
            ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }} \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/log-monitoring-system

            git pull origin main

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login \
              --username AWS \
              --password-stdin 830196002588.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/' .env

            docker compose pull

            docker compose up -d
