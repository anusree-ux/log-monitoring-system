services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:  ${POSTGRES_DB}

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${ECR_BACKEND_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped

    environment:
      DATABASE_URL: ${DATABASE_URL}

    depends_on:
      db:
        condition: service_healthy

    expose:
      - "5000"
    healthcheck:
      test: 
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ${ECR_FRONTEND_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
